<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" role="img" aria-label="NovumHealth">
  <title>NovumHealth</title>
  <!-- 4-petal mark -->
  <g transform="translate(8 8)">
    <!-- top petal -->
    <ellipse cx="32" cy="14" rx="9" ry="14" fill="#1e76b8"/>
    <!-- right petal -->
    <ellipse cx="50" cy="32" rx="14" ry="9" fill="#1e76b8"/>
    <!-- bottom petal -->
    <ellipse cx="32" cy="50" rx="9" ry="14" fill="#0f3a6b"/>
    <!-- left petal -->
    <ellipse cx="14" cy="32" rx="14" ry="9" fill="#0f3a6b"/>
    <!-- center -->
    <circle cx="32" cy="32" r="6" fill="#ffffff"/>
    <circle cx="32" cy="32" r="3" fill="#1e76b8"/>
  </g>
  <!-- Wordmark: Novum (navy) + Health (medium blue) -->
  <g font-family="'Inter', system-ui, -apple-system, Arial, sans-serif" font-size="36" font-weight="700">
    <text x="84" y="52" fill="#0f2d5c" letter-spacing="-0.5">Novum</text>
    <text x="222" y="52" fill="#1e76b8" letter-spacing="-0.5" font-weight="500">Health</text>
  </g>
</svg>
