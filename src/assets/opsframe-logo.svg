<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect x="0" y="0" width="32" height="32" rx="2" fill="#0F172A"/>
  <!-- Frame with open top-right corner -->
  <!-- Bottom edge -->
  <line x1="6" y1="26" x2="26" y2="26" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left edge -->
  <line x1="6" y1="6" x2="6" y2="26" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Top edge (stops short of right) -->
  <line x1="6" y1="6" x2="20" y2="6" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right edge (starts below top) -->
  <line x1="26" y1="12" x2="26" y2="26" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
</svg>